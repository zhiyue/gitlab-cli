name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64-apple-darwin (Intel Mac) build deferred — macos-13 runner
          # being deprecated by GitHub Actions; arm64 covers modern Macs.
          # Intel Mac users: use install.sh or `cargo install --git ...`.
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gitlab
          target: ${{ matrix.target }}
          archive: gitlab-cli-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}

  bump-homebrew:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Regenerate formula
        run: |
          # Give GitHub a few seconds to register all sha256 assets
          sleep 5
          ./scripts/update-homebrew-formula.sh "${{ steps.tag.outputs.tag }}"

      - name: Commit + push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet dist/homebrew/gitlab-cli.rb; then
            echo "no formula changes for this tag"
            exit 0
          fi
          git add dist/homebrew/gitlab-cli.rb
          git commit -m "chore(homebrew): update formula for ${{ steps.tag.outputs.tag }}"
          git push origin HEAD:main

      - name: Push to Homebrew tap (optional)
        if: ${{ vars.HOMEBREW_TAP_REPO != '' && env.TAP_TOKEN != '' }}
        env:
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TMP="$(mktemp -d)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" "$TMP/tap"
          mkdir -p "$TMP/tap/Formula"
          cp dist/homebrew/gitlab-cli.rb "$TMP/tap/Formula/gitlab-cli.rb"
          cd "$TMP/tap"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "tap already up-to-date"
            exit 0
          fi
          git add Formula/gitlab-cli.rb
          git commit -m "gitlab-cli ${TAG}"
          git push
